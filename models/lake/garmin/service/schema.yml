      Service table of intraday steps in 15-minute intervals. One row per (date, startGMT).
    columns:
      - name: date
        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: startGMT
        description: Interval start timestamp in UTC.
        tests:
          - unique
          - not_null
      - name: endGMT
        description: Interval end timestamp in UTC.
      - name: steps
        description: Number of steps in the interval.
      - name: _ingested_at
        description: Timestamp when the record was last ingested.
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date
            - startGMT

  - name: svc_garmin__stress
    description: >
      Service table of daily stress data. One row per calendarDate.
    columns:
      - name: calendarDate
        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: avgStressLevel
        description: Average stress level for the day (0-100).
      - name: maxStressLevel
        description: Maximum stress level for the day.
      - name: stressValuesArray
        description: Repeated record of timestamped stress readings.
      - name: _ingested_at
        description: Timestamp when the record was last ingested.
        tests:
          - not_null

  - name: svc_garmin__training_readiness
    description: >
      Service table of daily training readiness scores. One row per calendarDate.
    columns:
      - name: calendarDate
        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: score
        description: Training readiness score (0-100).
      - name: level
        description: Readiness level label (e.g., low, moderate, high).
      - name: sleepScore
        description: Sleep factor score.
      - name: recoveryTime
        description: Suggested recovery time in hours.
      - name: _ingested_at
        description: Timestamp when the record was last ingested.
        tests:
          - not_null

  - name: svc_garmin__training_status
    description: >
      Service table of daily training status. One row per date.
    columns:
      - name: date
        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: mostRecentVO2Max
        description: Nested record with the most recent VO2 max estimate.
      - name: mostRecentTrainingStatus
        description: Nested record with the current training status label.
      - name: mostRecentTrainingLoadBalance
        description: Nested record with training load balance metrics.
      - name: _ingested_at
        description: Timestamp when the record was last ingested.
        tests:
