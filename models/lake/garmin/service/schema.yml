        description: Calendar date.
        tests:
          - unique
          - not_null
      - name: totalSteps
        description: Total steps for the day.
      - name: totalKilocalories
        description: Total kilocalories burned.
      - name: restingHeartRate
        description: Resting heart rate.
      - name: averageStressLevel
        description: Average stress level (0-100).
      - name: bodyBatteryMostRecentValue
        description: Most recent body battery value.
      - name: _ingested_at
        description: Timestamp when the record was last ingested.
        tests:
