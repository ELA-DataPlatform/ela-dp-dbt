version: 2

models:
  - name: stg_spotify__recently_played
    description: >
      Deduplicated view of raw Spotify recently played data from the normalized layer.
      Each row represents a unique track play event, identified by the combination of
      played_at timestamp and track ID.
    columns:
      - name: played_at
        description: Timestamp indicating when the track was played.
        tests:
          - not_null
      - name: track
        description: >
          Nested record containing full track metadata including id, name, popularity,
          duration_ms, explicit flag, album details, and artist information.
      - name: context
        description: >
          Nested record containing playback context — the URI and type of the context
          in which the track was played (e.g., playlist, album, artist).
      - name: _ingested_at
        description: Timestamp when the record was ingested into the normalized table.
        tests:
          - not_null
  - name: stg_spotify__saved_tracks
    description: >
      View of saved tracks from the latest ingestion only.
      Each row represents a track saved in the user's Spotify library.
    columns:
      - name: added_at
        description: Timestamp when the track was saved to the user's library.
        tests:
          - not_null
      - name: track
        description: >
          Nested record containing full track metadata including id, name, popularity,
          duration_ms, explicit flag, album details, and artist information.
      - name: _ingested_at
        description: Timestamp of the ingestion batch.
        tests:
          - not_null
  - name: stg_spotify__saved_albums
    description: >
      View of saved albums from the latest ingestion only.
      Each row represents an album saved in the user's Spotify library.
    columns:
      - name: added_at
        description: Timestamp when the album was saved to the user's library.
        tests:
          - not_null
      - name: album
        description: >
          Nested record containing full album metadata including id, name, artists,
          tracks, label, release date, and images.
      - name: _ingested_at
        description: Timestamp of the ingestion batch.
        tests:
          - not_null
  - name: stg_spotify__album_detail
    description: >
      Deduplicated view of raw Spotify album detail data from the normalized layer.
      Each row represents the most recent fetch of a unique album.
    columns:
      - name: id
        description: Spotify unique album identifier.
        tests:
          - unique
          - not_null
      - name: name
        description: Album name.
      - name: artists
        description: Repeated record of artists associated with the album.
      - name: genres
        description: Repeated list of genres associated with the album.
      - name: label
        description: Record label that released the album.
      - name: popularity
        description: Album popularity score (0–100).
      - name: total_tracks
        description: Total number of tracks in the album.
      - name: release_date
        description: Album release date as a string.
      - name: release_date_precision
        description: Precision of the release date (year, month, or day).
      - name: album_type
        description: Type of album (album, single, or compilation).
      - name: _ingested_at
        description: Timestamp when the record was ingested into the normalized table.
        tests:
          - not_null
  - name: stg_spotify__album_tracks
    description: >
      Deduplicated view of raw Spotify album track data from the normalized layer.
      Each row represents the most recent fetch of a unique track within an album.
    columns:
      - name: id
        description: Spotify unique track identifier.
        tests:
          - not_null
      - name: album_id
        description: Spotify unique album identifier this track belongs to.
        tests:
          - not_null
      - name: name
        description: Track name.
      - name: artists
        description: Repeated record of artists featured on the track.
      - name: duration_ms
        description: Track duration in milliseconds.
      - name: explicit
        description: Whether the track contains explicit content.
      - name: track_number
        description: Track position within the album.
      - name: disc_number
        description: Disc number within the album.
      - name: _ingested_at
        description: Timestamp when the record was ingested into the normalized table.
        tests:
          - not_null
  - name: stg_spotify__artist_detail
    description: >
      Deduplicated view of raw Spotify artist detail data from the normalized layer.
      Each row represents the most recent fetch of a unique artist.
    columns:
      - name: id
        description: Spotify unique artist identifier.
        tests:
          - unique
          - not_null
      - name: name
        description: Artist name.
      - name: genres
        description: Repeated list of genres associated with the artist.
      - name: popularity
        description: Artist popularity score (0–100).
      - name: followers
        description: Nested record containing the artist's follower count.
      - name: _ingested_at
        description: Timestamp when the record was ingested into the normalized table.
        tests:
          - not_null
  - name: stg_spotify__playlists
    description: >
      View of the user's Spotify playlists from the latest ingestion only.
      Each row represents a playlist in the user's library.
    columns:
      - name: id
        description: Spotify unique playlist identifier.
        tests:
          - not_null
      - name: name
        description: Playlist name.
      - name: description
        description: Playlist description.
      - name: collaborative
        description: Whether the playlist is collaborative.
      - name: public
        description: Whether the playlist is public.
      - name: snapshot_id
        description: Version identifier for the playlist snapshot.
      - name: _ingested_at
        description: Timestamp of the ingestion batch.
        tests:
          - not_null
  - name: stg_spotify__top_artists
    description: >
      View of the user's top Spotify artists from the latest ingestion only.
      Each row represents an artist in the user's current top artists list.
    columns:
      - name: id
        description: Spotify unique artist identifier.
        tests:
          - not_null
      - name: name
        description: Artist name.
      - name: genres
        description: Repeated list of genres associated with the artist.
      - name: popularity
        description: Artist popularity score (0–100).
      - name: followers
        description: Nested record containing the artist's follower count.
      - name: _ingested_at
        description: Timestamp of the ingestion batch.
        tests:
          - not_null
  - name: stg_spotify__top_tracks
    description: >
      View of the user's top Spotify tracks from the latest ingestion only.
      Each row represents a track in the user's current top tracks list.
    columns:
      - name: id
        description: Spotify unique track identifier.
        tests:
          - not_null
      - name: name
        description: Track name.
      - name: artists
        description: Repeated record of artists featured on the track.
      - name: album
        description: Nested record containing album metadata.
      - name: duration_ms
        description: Track duration in milliseconds.
      - name: popularity
        description: Track popularity score (0–100).
      - name: explicit
        description: Whether the track contains explicit content.
      - name: _ingested_at
        description: Timestamp of the ingestion batch.
        tests:
          - not_null
